name: Build Docker Image

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'lobehub/lobehub'
        path: 'target-repo'
        
    - name: Checkout Current Repository (for patch file)
      uses: actions/checkout@v4
      with:
        path: 'patch-repo'
        
    - name: Apply patchs
      working-directory: target-repo   # 在目标仓库目录下执行
      run: |
        for patch in ../patch-repo/patches/*.patch; do
          # 检查是否有匹配的文件，防止没有补丁时执行报错
          [ -e "$patch" ] || continue 
          echo "Applying patch: $patch"
          git apply --ignore-whitespace "$patch"
        done
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Read Date For Version
      id: version
      run: |
        VERSION=$(date +"%Y%m%d%H%M")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building Docker image with version: $VERSION"

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/lobehub
        tags: |
          type=raw,value=${{ steps.version.outputs.version }}
          type=raw,value=latest
            
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./target-repo 
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
