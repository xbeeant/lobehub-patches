name: Build Docker Image

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: 'lobehub/lobehub'
        path: 'target-repo'
        
    - name: Checkout Current Repository (for patch file)
      uses: actions/checkout@v4
      with:
        path: 'patch-repo'
        
    - name: Apply patchs
      working-directory: target-repo   # 在目标仓库目录下执行
      run: |
        echo "Searching for patches in ../patch-repo/patches..."
        
        # 1. 使用 find 查找所有 .patch 文件
        # 2. sort 确保按文件名排序执行（例如先执行 disable 再执行 token-auth）
        # 3. xargs 将找到的文件传递给 git apply
        find ../patch-repo/patches -name "*.patch" | sort | while read patch_file; do
          echo "Applying: $patch_file"
          if ! git apply --ignore-whitespace "$patch_file"; then
            echo "::error::Failed to apply patch: $patch_file"
            exit 1
          fi
        done
        
        echo "All patches applied successfully."
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Read Date For Version
      id: version
      run: |
        VERSION=$(date +"%Y%m%d%H%M")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building Docker image with version: $VERSION"

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/lobehub
        tags: |
          type=raw,value=${{ steps.version.outputs.version }}
          type=raw,value=latest
            
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./target-repo 
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
